function useIsMobile(bp = 768) {
  const [w, setW] = useState(typeof window !== "undefined" ? window.innerWidth : 1024);
  useEffect(() => { const h = () => setW(window.innerWidth); window.addEventListener("resize", h); return () => window.removeEventListener("resize", h); }, []);
  return { isMobile: w <= bp, isTablet: w > bp && w <= 1024, width: w };
}

// ═══ DYNAMIC PROPERTY SVG VISUALIZATION ═══
function PropertyVisualization({ formData }) {
  const { isMobile } = useIsMobile();
  const floors = parseInt(formData.floors) || 2;
  const style = formData.style;
  const features = formData.specialFeatures || [];
  const hasPool = features.includes("Swimming Pool");
  const hasGarden = features.includes("Garden / Lawn");
  const hasTerrace = features.includes("Rooftop Terrace");
  const hasSolar = features.includes("Solar Panels");
  const hasBalcony = features.includes("Mountain View Balcony") || features.includes("Balcony with Mountain View");

  const w = isMobile ? 340 : 500;
  const h = isMobile ? 320 : 420;
  const floorH = Math.min(55, (h - 160) / floors);
  const buildingW = w * 0.45;
  const baseX = (w - buildingW) / 2;
  const baseY = h - 80;

  const isModern = style === "modern" || style === "minimalist";
  const isTraditional = style === "traditional";
  const isColonial = style === "colonial";
  const isLuxury = style === "luxury";

  const wallColor = isModern ? "#e8e0d0" : isTraditional ? "#d4a76a" : isColonial ? "#f5efe6" : isLuxury ? "#f0e6d3" : "#e8e0d0";
  const roofColor = isModern ? "#555" : isTraditional ? "#8B4513" : isColonial ? "#4a6741" : isLuxury ? "#2c1810" : "#666";
  const windowColor = isModern ? "#87CEEB" : "#a8d8ea";
  const trimColor = isColonial ? "#f5f5f5" : isLuxury ? GOLD : "#ccc";

  return (
    <svg viewBox={`0 0 ${w} ${h}`} style={{ width: "100%", maxWidth: w, borderRadius: 4, background: "linear-gradient(180deg, #87CEEB 0%, #b8d4e3 40%, #d4e6d4 60%, #90b090 100%)" }}>
      {/* Sky gradient */}
      <defs>
        <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#5b9bd5" /><stop offset="60%" stopColor="#87CEEB" /><stop offset="100%" stopColor="#b8d4e3" /></linearGradient>
        <linearGradient id="grass" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#6b8e4e" /><stop offset="100%" stopColor="#4a7a3a" /></linearGradient>
        <linearGradient id="mountain" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#6b8e6b" /><stop offset="100%" stopColor="#8aaa7a" /></linearGradient>
      </defs>
      <rect x="0" y="0" width={w} height={h} fill="url(#sky)" />

      {/* Mountains */}
      <polygon points={`0,${h * 0.35} ${w * 0.15},${h * 0.15} ${w * 0.3},${h * 0.35}`} fill="#7a9a6a" opacity="0.6" />
      <polygon points={`${w * 0.2},${h * 0.35} ${w * 0.4},${h * 0.1} ${w * 0.6},${h * 0.35}`} fill="#6b8e5b" opacity="0.7" />
      <polygon points={`${w * 0.5},${h * 0.35} ${w * 0.7},${h * 0.12} ${w * 0.9},${h * 0.35}`} fill="#7a9a6a" opacity="0.5" />
      <polygon points={`${w * 0.7},${h * 0.35} ${w * 0.85},${h * 0.18} ${w},${h * 0.35}`} fill="#6b8e5b" opacity="0.6" />

      {/* Snow caps */}
      <polygon points={`${w * 0.37},${h * 0.1} ${w * 0.4},${h * 0.1} ${w * 0.42},${h * 0.15} ${w * 0.38},${h * 0.14}`} fill="white" opacity="0.8" />
      <polygon points={`${w * 0.68},${h * 0.12} ${w * 0.7},${h * 0.12} ${w * 0.72},${h * 0.17} ${w * 0.67},${h * 0.16}`} fill="white" opacity="0.7" />

      {/* Ground */}
      <rect x="0" y={baseY} width={w} height={80} fill="url(#grass)" />
      <ellipse cx={w / 2} cy={baseY} rx={w * 0.55} ry={12} fill="#5a7e44" opacity="0.3" />

      {/* Driveway */}
      <path d={`M${w / 2 - 15},${h} L${w / 2 - 8},${baseY + 5} L${w / 2 + 8},${baseY + 5} L${w / 2 + 15},${h}`} fill="#9e9585" opacity="0.7" />

      {/* Trees */}
      {hasGarden && <>
        <circle cx={baseX - 30} cy={baseY - 20} r={18} fill="#4a7a3a" /><circle cx={baseX - 38} cy={baseY - 12} r={14} fill="#5a8a4a" /><rect x={baseX - 33} y={baseY - 5} width={6} height={20} fill="#6b4226" rx="2" />
        <circle cx={baseX + buildingW + 30} cy={baseY - 25} r={20} fill="#4a7a3a" /><circle cx={baseX + buildingW + 22} cy={baseY - 15} r={15} fill="#5a8a4a" /><rect x={baseX + buildingW + 27} y={baseY - 5} width={6} height={20} fill="#6b4226" rx="2" />
        <circle cx={baseX - 55} cy={baseY - 15} r={14} fill="#5a9a4a" /><rect x={baseX - 58} y={baseY - 2} width={5} height={16} fill="#6b4226" rx="2" />
      </>}

      {/* Building floors */}
      {Array.from({ length: floors }).map((_, i) => {
        const fy = baseY - (i + 1) * floorH;
        const fw = buildingW - (isTraditional ? i * 4 : 0);
        const fx = baseX + (isTraditional ? i * 2 : 0);
        return (
          <g key={i}>
            <rect x={fx} y={fy} width={fw} height={floorH} fill={wallColor} stroke="#bbb" strokeWidth="0.5" />
            {/* Floor line */}
            <line x1={fx} y1={fy + floorH} x2={fx + fw} y2={fy + floorH} stroke="#aaa" strokeWidth="1" />
            {/* Windows */}
            {Array.from({ length: Math.min(4, Math.floor(fw / 40)) }).map((_, j) => {
              const ww = isModern ? 28 : 18;
              const wh = isModern ? 30 : 22;
              const gap = fw / (Math.min(4, Math.floor(fw / 40)) + 1);
              const wx = fx + gap * (j + 1) - ww / 2;
              const wy = fy + (floorH - wh) / 2;
              return (
                <g key={j}>
                  <rect x={wx} y={wy} width={ww} height={wh} fill={windowColor} stroke={trimColor} strokeWidth="1" rx={isTraditional ? 4 : isModern ? 0 : 2} />
                  <line x1={wx + ww / 2} y1={wy} x2={wx + ww / 2} y2={wy + wh} stroke={trimColor} strokeWidth="0.5" />
                  {!isModern && <line x1={wx} y1={wy + wh / 2} x2={wx + ww} y2={wy + wh / 2} stroke={trimColor} strokeWidth="0.5" />}
                  {/* Balcony on upper floors */}
                  {hasBalcony && i > 0 && j === 1 && <>
                    <rect x={wx - 4} y={wy + wh} width={ww + 8} height={3} fill="#888" rx="1" />
                    <line x1={wx - 4} y1={wy + wh + 3} x2={wx - 4} y2={wy + wh + 12} stroke="#888" strokeWidth="1.5" />
                    <line x1={wx + ww + 4} y1={wy + wh + 3} x2={wx + ww + 4} y2={wy + wh + 12} stroke="#888" strokeWidth="1.5" />
                    <rect x={wx - 4} y={wy + wh + 11} width={ww + 8} height={2} fill="#888" rx="1" />
                  </>}
                </g>
              );
            })}
            {/* Colonial columns */}
            {isColonial && i === 0 && <>
              <rect x={fx + 8} y={fy} width={5} height={floorH} fill="#f5f5f5" rx="2" />
              <rect x={fx + fw - 13} y={fy} width={5} height={floorH} fill="#f5f5f5" rx="2" />
            </>}
          </g>
        );
      })}

      {/* Door */}
      <rect x={w / 2 - 12} y={baseY - floorH + 15} width={24} height={floorH - 15} fill={isLuxury ? "#3d1f0a" : "#5a3a1a"} rx={isTraditional ? 8 : 0} />
      <circle cx={w / 2 + 7} cy={baseY - floorH / 2 + 8} r={2} fill={GOLD} />

      {/* Roof */}
      {isModern || style === "minimalist" ? (
        <rect x={baseX - 5} y={baseY - floors * floorH - 6} width={buildingW + 10} height={8} fill={roofColor} rx="1" />
      ) : (
        <polygon
          points={`${baseX - 10},${baseY - floors * floorH} ${w / 2},${baseY - floors * floorH - 40} ${baseX + buildingW + 10},${baseY - floors * floorH}`}
          fill={roofColor} stroke="#666" strokeWidth="0.5"
        />
      )}

      {/* Solar panels */}
      {hasSolar && isModern && <>
        <rect x={baseX + 10} y={baseY - floors * floorH - 18} width={30} height={12} fill="#2244aa" opacity="0.8" rx="1" stroke="#3355cc" strokeWidth="0.5" />
        <rect x={baseX + 45} y={baseY - floors * floorH - 18} width={30} height={12} fill="#2244aa" opacity="0.8" rx="1" stroke="#3355cc" strokeWidth="0.5" />
      </>}
      {hasSolar && !isModern && <>
        <rect x={w / 2 - 30} y={baseY - floors * floorH - 32} width={25} height={10} fill="#2244aa" opacity="0.8" rx="1" transform={`rotate(-15, ${w / 2 - 17}, ${baseY - floors * floorH - 27})`} />
      </>}

      {/* Terrace furniture */}
      {hasTerrace && isModern && <>
        <rect x={baseX + buildingW - 35} y={baseY - floors * floorH - 4} width={16} height={4} fill="#8B4513" rx="1" />
        <rect x={baseX + buildingW - 50} y={baseY - floors * floorH - 3} width={10} height={3} fill="#666" rx="1" />
      </>}

      {/* Swimming pool */}
      {hasPool && <>
        <ellipse cx={baseX + buildingW + 55} cy={baseY + 20} rx={30} ry={14} fill="#4fa8d4" stroke="#3090b8" strokeWidth="1" />
        <ellipse cx={baseX + buildingW + 55} cy={baseY + 18} rx={26} ry={11} fill="#5bbde8" opacity="0.6" />
      </>}

      {/* Sun */}
      <circle cx={w * 0.85} cy={h * 0.08} r={20} fill="#FFD700" opacity="0.8" />
      {[0, 45, 90, 135, 180, 225, 270, 315].map(a => {
        const rad = (a * Math.PI) / 180;
        return <line key={a} x1={w * 0.85 + Math.cos(rad) * 24} y1={h * 0.08 + Math.sin(rad) * 24} x2={w * 0.85 + Math.cos(rad) * 30} y2={h * 0.08 + Math.sin(rad) * 30} stroke="#FFD700" strokeWidth="1.5" opacity="0.5" />;
      })}

      {/* Label */}
      <rect x={10} y={h - 32} width={w - 20} height={26} fill="rgba(26,39,68,0.85)" rx="4" />
      <text x={w / 2} y={h - 15} textAnchor="middle" fill={GOLD} fontSize="11" fontFamily="Montserrat, sans-serif" fontWeight="600" letterSpacing="0.5">
        {formData.bedrooms} BHK {formData.style?.toUpperCase()} {formData.propertyType?.toUpperCase()} • {formData.floors} FLOOR{floors > 1 ? "S" : ""} • {formData.plotSize} SQ FT
      </text>
    </svg>
  );
}

      {/* Map title */}
      <div style={{ fontFamily: "'Montserrat', sans-serif", fontSize: 11, color: GOLD, letterSpacing: "0.2em", marginBottom: 12, fontWeight: 500 }}>📍 INTERACTIVE DEHRADUN MAP — TAP AN AREA</div>

        <line x1="30" y1="65" x2="58" y2="88" stroke="rgba(196,155,60,0.08)" strokeWidth="0.3" strokeDasharray="1,2" />

        {/* Compass */}
        <g transform="translate(90, 90)">
          <circle r="5" fill="none" stroke="rgba(196,155,60,0.3)" strokeWidth="0.3" />
          <text x="0" y="-6" textAnchor="middle" fill={GOLD} fontSize="3" fontWeight="600">N</text>
          <line x1="0" y1="-4" x2="0" y2="-2" stroke={GOLD} strokeWidth="0.5" />
        </g>

        {/* Area markers */}
        {DEHRADUN_AREAS.map(area => {
          const isSelected = selectedArea?.id === area.id;

          const r = isSelected ? 4.5 : isHov ? 3.8 : 2.8;
          return (
            <g key={area.id}
              onClick={() => onSelectArea(area)}
              onMouseEnter={() => setHovered(area.id)}
              onMouseLeave={() => setHovered(null)}
              style={{ cursor: "pointer" }}
            >
              {/* Pulse ring for selected */}
              {isSelected && <circle cx={area.x} cy={area.y} r={8} fill="none" stroke={GOLD} strokeWidth="0.5" opacity="0.4">
                <animate attributeName="r" from="5" to="10" dur="1.5s" repeatCount="indefinite" />
                <animate attributeName="opacity" from="0.5" to="0" dur="1.5s" repeatCount="indefinite" />
              </circle>}
              <circle cx={area.x} cy={area.y} r={r + 1} fill={isSelected ? GOLD : area.color} opacity={isSelected ? 0.25 : 0.15} />
              <circle cx={area.x} cy={area.y} r={r} fill={isSelected ? GOLD : area.color} opacity={isSelected ? 1 : 0.85} filter={isSelected ? "url(#glow)" : undefined} />
              <text x={area.x} y={area.y + (area.y < 20 ? r + 5 : -(r + 2))} textAnchor="middle" fill={isSelected ? GOLD : "rgba(255,255,255,0.7)"} fontSize={isSelected ? "3" : "2.5"} fontFamily="Montserrat, sans-serif" fontWeight={isSelected ? "700" : "400"}>
                {isMobile ? area.name.split(" ")[0] : area.name}
              </text>
            </g>
          );
        })}
      </svg>

      {/* Hover/selected tooltip */}
      {(hovered || selectedArea) && (() => {
        const area = DEHRADUN_AREAS.find(a => a.id === (hovered || selectedArea?.id));
        if (!area) return null;
        return (
          <div style={{
            position: "absolute", bottom: isMobile ? 12 : 20, left: isMobile ? 12 : 20, right: isMobile ? 12 : "auto",
            background: "rgba(26,39,68,0.95)", border: `1px solid ${GOLD}44`,
            padding: isMobile ? "10px 14px" : "12px 18px", borderRadius: 4, maxWidth: isMobile ? "auto" : 280,
            backdropFilter: "blur(8px)",
          }}>
            <div style={{ fontFamily: "'Cormorant Garamond', serif", fontSize: isMobile ? 16 : 18, color: "white", fontWeight: 600 }}>{area.name}</div>
            <div style={{ fontFamily: "'Montserrat', sans-serif", fontSize: 12, color: GOLD, fontWeight: 600, marginTop: 4 }}>
              ₹{area.priceMin.toLocaleString()} – ₹{area.priceMax.toLocaleString()}/sq ft
            </div>
            <div style={{ fontFamily: "'Montserrat', sans-serif", fontSize: 11, color: "rgba(255,255,255,0.6)", marginTop: 4, lineHeight: 1.5 }}>
              Zone {area.zone} • Growth: {area.growth}/yr
            </div>
          </div>
        );
      })()}
    </div>
  );
}

// ═══ LAND PRICE CALCULATOR ═══
function LandPriceCalculator() {
  const { isMobile } = useIsMobile();
  const [selectedArea, setSelectedArea] = useState(null);
  const [landSize, setLandSize] = useState(2000);
  const [sizeUnit, setSizeUnit] = useState("sqft");
  const [landUse, setLandUse] = useState("residential");

  const landUseMultiplier = { residential: 1, commercial: 1.8, agricultural: 0.35, mixed: 1.4 };
  const multiplier = landUseMultiplier[landUse] || 1;

  const sizeInSqFt = sizeUnit === "sqft" ? landSize : sizeUnit === "sqyd" ? landSize * 9 : sizeUnit === "sqm" ? landSize * 10.764 : landSize * 43560;

  const minPrice = selectedArea ? Math.round(sizeInSqFt * selectedArea.priceMin * multiplier) : 0;
  const maxPrice = selectedArea ? Math.round(sizeInSqFt * selectedArea.priceMax * multiplier) : 0;
  const circleValue = selectedArea ? Math.round((sizeInSqFt / 10.764) * selectedArea.circleRate) : 0;
  const stampDuty = Math.round(circleValue * 0.05);
  const regCharges = Math.round(circleValue * 0.02);

  const formatINR = (n) => {
    if (n >= 10000000) return `₹${(n / 10000000).toFixed(2)} Cr`;
    if (n >= 100000) return `₹${(n / 100000).toFixed(2)} L`;
    return `₹${n.toLocaleString("en-IN")}`;
  };

  return (
    <section id="landcalc" style={{ padding: isMobile ? "60px 20px" : "100px 40px", background: `linear-gradient(180deg, white 0%, ${CREAM} 100%)` }}>
      <div style={{ maxWidth: 1200, margin: "0 auto" }}>
        <div style={{ textAlign: "center", marginBottom: isMobile ? 36 : 60 }}>
          <span style={{ fontFamily: "'Montserrat', sans-serif", fontSize: 12, color: GOLD, letterSpacing: "0.3em", fontWeight: 500 }}>REAL-TIME PRICING</span>
          <h2 style={{ fontFamily: "'Cormorant Garamond', serif", fontSize: isMobile ? 26 : "clamp(32px, 4vw, 48px)", color: NAVY, fontWeight: 600, marginTop: 12, marginBottom: 12 }}>Dehradun Land Price Calculator</h2>

            Select a location on the interactive map, enter your land requirements, and get an instant estimated price based on current 2025-26 Dehradun market data.
          </p>
        </div>

        <div style={{ display: "grid", gridTemplateColumns: isMobile ? "1fr" : "1fr 1fr", gap: isMobile ? 24 : 40 }}>
          {/* Map */}
          <DehradunMap selectedArea={selectedArea} onSelectArea={setSelectedArea} />

          {/* Calculator panel */}
          <div>
            {/* Area selector dropdown (backup) */}
            <div style={{ marginBottom: 20 }}>
              <label style={{ fontFamily: "'Montserrat', sans-serif", fontSize: 11, color: BODY_TEXT, letterSpacing: "0.1em", fontWeight: 500, display: "block", marginBottom: 8 }}>SELECTED LOCATION</label>

                width: "100%", padding: "14px 16px", border: `1.5px solid ${selectedArea ? GOLD : "#e0ddd5"}`,
                borderRadius: 2, fontFamily: "'Montserrat', sans-serif", fontSize: 14,
                outline: "none", background: "white", color: DARK_TEXT, cursor: "pointer",
              }}>
                <option value="">— Select area on map or here —</option>
                {DEHRADUN_AREAS.sort((a, b) => a.name.localeCompare(b.name)).map(a => <option key={a.id} value={a.id}>{a.name} (₹{a.priceMin}–₹{a.priceMax}/sqft)</option>)}
              </select>
            </div>

            {selectedArea && (
              <div style={{ padding: 16, background: `${GOLD}0a`, border: `1px solid ${GOLD}33`, borderRadius: 4, marginBottom: 20 }}>
                <div style={{ fontFamily: "'Montserrat', sans-serif", fontSize: 12, color: BODY_TEXT, lineHeight: 1.6 }}>
                  <strong style={{ color: NAVY }}>{selectedArea.name}</strong> — {selectedArea.description}

              </div>

            {/* Land size */}

                  fontFamily: "'Montserrat', sans-serif", fontSize: 16, outline: "none", boxSizing: "border-box",
                }} />

// ═══ EMI CALCULATOR ═══
function EMICalc() {
  const { isMobile } = useIsMobile();
  const [loan, setLoan] = useState(5000000);
  const [rate, setRate] = useState(8.5);
  const [tenure, setTenure] = useState(20);
  const r = rate / 12 / 100, n = tenure * 12;
  const emi = loan * r * Math.pow(1 + r, n) / (Math.pow(1 + r, n) - 1);
  return (
    <section id="emi" style={{ padding: isMobile ? "60px 20px" : "100px 40px", background: LIGHT }}>
      <div style={{ maxWidth: 900, margin: "0 auto" }}>
        <div style={{ textAlign: "center", marginBottom: isMobile ? 30 : 50 }}>
          <span style={{ fontFamily: "'Montserrat', sans-serif", fontSize: 12, color: GOLD, letterSpacing: "0.3em", fontWeight: 500 }}>FINANCIAL TOOLS</span>
          <h2 style={{ fontFamily: "'Cormorant Garamond', serif", fontSize: isMobile ? 28 : 42, color: NAVY, fontWeight: 600, marginTop: 12 }}>EMI Calculator</h2>
        </div>
        <div style={{ display: "grid", gridTemplateColumns: isMobile ? "1fr" : "1.2fr 1fr", gap: isMobile ? 24 : 40, background: "white", padding: isMobile ? 24 : 50, boxShadow: "0 4px 40px rgba(26,39,68,0.06)", borderRadius: 2 }}>
          <div>
            {[{ l: "Loan (₹)", v: loan, s: setLoan, mn: 500000, mx: 50000000, st: 100000, d: `₹${(loan / 100000).toFixed(1)}L` }, { l: "Rate (%)", v: rate, s: setRate, mn: 5, mx: 15, st: 0.1, d: `${rate}%` }, { l: "Tenure", v: tenure, s: setTenure, mn: 1, mx: 30, st: 1, d: `${tenure} yrs` }].map((s, i) => (
              <div key={i} style={{ marginBottom: 28 }}>
                <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 10 }}>
                  <label style={{ fontFamily: "'Montserrat', sans-serif", fontSize: 11, color: BODY_TEXT, letterSpacing: "0.1em", fontWeight: 500 }}>{s.l}</label>
                  <span style={{ fontFamily: "'Cormorant Garamond', serif", fontSize: 18, color: NAVY, fontWeight: 600 }}>{s.d}</span>
                </div>
                <input type="range" min={s.mn} max={s.mx} step={s.st} value={s.v} onChange={e => s.s(Number(e.target.value))} style={{ width: "100%", accentColor: GOLD, height: 6 }} />
              </div>
            ))}
          </div>
          <div style={{ background: NAVY, padding: isMobile ? 24 : 36, borderRadius: 2, display: "flex", flexDirection: "column", justifyContent: "center" }}>
            <div style={{ marginBottom: 24 }}>
              <div style={{ fontFamily: "'Montserrat', sans-serif", fontSize: 11, color: "rgba(255,255,255,0.5)", letterSpacing: "0.15em", marginBottom: 6 }}>MONTHLY EMI</div>
              <div style={{ fontFamily: "'Cormorant Garamond', serif", fontSize: isMobile ? 32 : 40, color: GOLD, fontWeight: 700 }}>₹{Math.round(emi).toLocaleString("en-IN")}</div>
            </div>
            {[{ l: "Principal", v: `₹${loan.toLocaleString("en-IN")}` }, { l: "Interest", v: `₹${Math.round(emi * n - loan).toLocaleString("en-IN")}` }, { l: "Total", v: `₹${Math.round(emi * n).toLocaleString("en-IN")}` }].map((i, j) => (
              <div key={j} style={{ display: "flex", justifyContent: "space-between", padding: "12px 0", borderTop: j === 0 ? `1px solid ${GOLD}33` : "1px solid rgba(255,255,255,0.05)" }}>
                <span style={{ fontFamily: "'Montserrat', sans-serif", fontSize: 11, color: "rgba(255,255,255,0.5)" }}>{i.l}</span>
                <span style={{ fontFamily: "'Montserrat', sans-serif", fontSize: 12, color: "white", fontWeight: 500 }}>{i.v}</span>
              </div>
            ))}
          </div>
        </div>
      </div>
    </section>
  );
}
